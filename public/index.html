        // ─── ROUTER ──────────────────────────────────────────────────────────────

        const routes = {
            '/': renderHome,
            '/services': renderNotFound,
            '/products': renderProducts,
            '/contact': renderContact,
            '/account': renderAccount,
            '/cart': renderCart,
            '/add-product': renderNotFound
        };

        function navigate(path) {
            window.history.pushState({}, '', path);
            renderRoute(path);
        }

        function renderRoute(path) {
            const fn = routes[path] || renderNotFound;
            fn();
            updateActiveNav(path);
            window.scrollTo(0, 0);
        }

        function updateActiveNav(path) {
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) link.classList.add('active');
            });
        }

        function renderNotFound() {
            document.title = 'Arpith Binsa';
            document.getElementById('app').innerHTML =
                '<p style="padding:200px 0;text-align:center">Coming soon.</p>';
        }

        document.addEventListener('click', e => {
            const link = e.target.closest('a[href]');
            if (!link) return;
            const href = link.getAttribute('href');
            if (href && href.startsWith('/') && !href.startsWith('//')) {
                e.preventDefault();
                navigate(href);
            }
        });

        window.addEventListener('popstate', () => renderRoute(window.location.pathname));

        document.addEventListener('DOMContentLoaded', () => renderRoute(window.location.pathname));

        let allProducts = [];

        let searchTimeout;

        function renderProducts() {
            document.title = 'Products – Arpith Binsa';

                                <button class="filter-btn" onclick="filterProducts('accessory', this)">Accessories</button>
                            </div>
                        </div>

                        <div id="loading" class="loading-state">Loading products...</div>
                        <div class="products-listing" id="products-listing" style="display:none"></div>
                        <div id="products-empty" class="cart-empty-box" style="display:none">
                            <p>No products found.</p>
                        </div>

                    </div>
                </div>
            `;

            currentCategory = 'all';
            loadProducts();
        }

        async function loadProducts(search = '') {
            const loading = document.getElementById('loading');
            const listing = document.getElementById('products-listing');
            const empty = document.getElementById('products-empty');
            if (!loading) return;

            loading.style.display = 'block';
            listing.style.display = 'none';
            empty.style.display = 'none';

            try {
                let url = `${API}/products`;
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (currentCategory !== 'all') params.push(`category=${currentCategory}`);
                if (params.length) url += '?' + params.join('&');

                const res = await fetch(url);
                const products = await res.json();
                allProducts = products;

                loading.style.display = 'none';

                if (products.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                listing.style.display = 'flex';
                listing.innerHTML = products.map(product => `
                    <div class="product-listing-card">
                        <div class="product-listing-img-wrap" onclick="goToProduct('${product._id}')" style="cursor:pointer">
                            <img src="${product.image}" alt="${product.name}"
                                onerror="this.src='images/favicon (1) (1).png'">
                        </div>
                        <div class="product-listing-info">
                            <span class="product-tag">${product.category}</span>
                            <h3 onclick="goToProduct('${product._id}')" style="cursor:pointer">${product.name}</h3>
                            <p>${product.description}</p>
                            <div class="product-listing-bottom">
                                <span class="product-listing-price">€${product.price.toLocaleString()}</span>
                                <div class="qty-add">
                                    <div class="quantity-control">
                                        <button onclick="changeQty('${product._id}', -1)">−</button>
                                        <span id="qty-${product._id}">1</span>
                                        <button onclick="changeQty('${product._id}', 1)">+</button>
                                    </div>
                                    <button class="btn-add-cart"
                                        onclick="addToCart('${product._id}', '${product.name}', ${product.price}, '${product.image}', parseInt(document.getElementById('qty-${product._id}').textContent))">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                document.querySelector('#products-empty p').textContent =
                    'Failed to load products. Is the server running?';
            }
        }

        function changeQty(id, direction) {
            const el = document.getElementById('qty-' + id);
            let val = parseInt(el.textContent);
            el.textContent = Math.max(1, val + direction);
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const search = document.getElementById('search-input').value;
                loadProducts(search);
            }, 400);
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = category;
            const search = document.getElementById('search-input').value;
            loadProducts(search);
        }

        function goToProduct(id) {

        function refreshCartItems() {
            const cart = getCart();
            const items = Object.values(cart);
            const container = document.getElementById('cart-items');
            const emptyState = document.getElementById('cart-empty');
            const cartLayout = document.getElementById('cart-layout');

            if (items.length === 0) {
                cartLayout.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            cartLayout.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = items.map(item => `
                <div class="cart-item" id="item-${item.id}">
                    <div class="cart-item-img">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p class="cart-item-price">€${item.price.toLocaleString()}</p>
                        <div class="quantity-control" style="margin-top: 12px">
                            <button onclick="changeCartItemQty('${item.id}', ${item.qty - 1})">−</button>
                            <span>${item.qty}</span>
                            <button onclick="changeCartItemQty('${item.id}', ${item.qty + 1})">+</button>
                        </div>
                    </div>
                    <div class="cart-item-right">
                        <p class="cart-item-total">€${(item.price * item.qty).toLocaleString()}</p>
                        <button class="cart-remove" onclick="removeCartItem('${item.id}')">Remove</button>
                    </div>
                </div>
            `).join('');

            updateCartSummary();
            loadPayPalSDK(renderPayPalButtons);
        }

        function changeCartItemQty(id, newQty) {
            updateQty(id, newQty);
            refreshCartItems();
        }

        function removeCartItem(id) {
            removeFromCart(id);
            refreshCartItems();
        }

        function updateCartSummary() {
            const count = getCartCount();
            const total = getCartTotal();
            document.getElementById('summary-count').textContent = count;
            document.getElementById('summary-subtotal').textContent = '€' + total.toLocaleString();
            document.getElementById('summary-total').textContent = '€' + total.toLocaleString();
        }

        function loadPayPalSDK(callback) {
            if (window.paypal) {
                callback();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://www.paypal.com/sdk/js?client-id=ATLGa7p3a7o8yrpzlIlDmOSI8cPnZT_QyID5ajjYTfxYumjay_QUZwrlmmWBUJ6XWutoZUwi2VUcJswe&currency=EUR';
            script.onload = callback;
            document.head.appendChild(script);
        }

        function renderPayPalButtons() {
            if (paypalRendered) return;
            paypalRendered = true;

            paypal.Buttons({
                createOrder: function (data, actions) {
                    const total = getCartTotal();
                    const itemList = Object.values(getCart()).map(i => `${i.name} x${i.qty}`).join(', ');
                    return actions.order.create({
                        purchase_units: [{ amount: { value: total.toString(), currency_code: 'EUR' }, description: itemList }]
                    });
                },
                onApprove: function (data, actions) {
                    return actions.order.capture().then(function (details) {
                        const token = localStorage.getItem('token');
                        const cart = getCart();
                        const total = getCartTotal();
                        if (token) {
                            fetch(`${API}/orders`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ items: Object.values(cart), total, paypalOrderId: details.id })
                            });
                        }
                        clearCart();
                        document.getElementById('paypal-button-container').style.display = 'none';
                        document.getElementById('order-success').style.display = 'block';
                        document.getElementById('cart-items').style.display = 'none';
                    });
                },
                onError: function () {
                    alert('Payment failed. Please try again.');
                },
                style: { color: 'gold', shape: 'pill', label: 'buynow', height: 50 }
            }).render('#paypal-button-container');
        }

                            <div id="orders-list"></div>
                            <div id="orders-empty" style="display:none">
                                <div class="cart-empty-box">
                                    <p>No orders yet.</p>
                                    <a href="/products" class="btn-primary"
                                        style="background:#111; color:#fff; margin-top:16px; display:inline-block">
                                        Shop Now
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const token = localStorage.getItem('token');
            if (token) {
                showAccountSection();
            } else {
                showAuthSection();
            }
        }

        function showAuthSection() {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('account-section').style.display = 'none';
        }

        function showAccountSection() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('account-section').style.display = 'block';
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('account-name').textContent = `Hello, ${user.name}`;
                document.getElementById('account-email').textContent = user.email;
            }
            loadOrders();
        }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.message || 'Login failed.';
                    errorEl.style.display = 'block';
                    return;
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAccountSection();
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Try again.';
                errorEl.style.display = 'block';
            }
        }

        async function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const errorEl = document.getElementById('register-error');

            if (!name || !email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.message || 'Registration failed.';
                    errorEl.style.display = 'block';
                    return;
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAccountSection();
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Try again.';
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showAuthSection();
        }

        async function loadOrders() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API}/orders/my-orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await res.json();
                const list = document.getElementById('orders-list');
                const empty = document.getElementById('orders-empty');

                if (!orders.length) {
                    list.style.display = 'none';
                    empty.style.display = 'block';
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Order #${order._id.slice(-6).toUpperCase()}</span>
                                <span class="order-date">${new Date(order.createdAt).toLocaleDateString('en-GB', {
                                    day: 'numeric', month: 'long', year: 'numeric'
                                })}</span>
                            </div>
                            <div class="order-status">
                                <span class="status-badge">${order.status}</span>
                                <span class="order-total">€${order.total.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <div class="order-item-img">
                                        <img src="${item.image}" alt="${item.name}">
                                    </div>
                                    <div class="order-item-info">
                                        <p class="order-item-name">${item.name}</p>
                                        <p class="order-item-meta">Qty: ${item.qty} · €${item.price.toLocaleString()}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error('Failed to load orders:', err);
            }
        }

        async function sendMessage() {
            const name = document.getElementById('contact-name').value.trim();
            const email = document.getElementById('contact-email').value.trim();
            const subject = document.getElementById('contact-subject').value;
            const message = document.getElementById('contact-message').value.trim();
            const errorEl = document.getElementById('contact-error');
            const successEl = document.getElementById('contact-success');

            if (!name || !email || !subject || !message) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`${API}/contact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, subject, message })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.message || 'Failed to send message.';
                    errorEl.style.display = 'block';
                    return;
                }

                errorEl.style.display = 'none';
                successEl.style.display = 'block';

                document.getElementById('contact-name').value = '';
                document.getElementById('contact-email').value = '';
                document.getElementById('contact-subject').value = '';
                document.getElementById('contact-message').value = '';

            } catch (err) {
                errorEl.textContent = 'Something went wrong. Is the server running?';
                errorEl.style.display = 'block';
            }
        }
    </script>

</body>

</html>
