<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Arpith Binsa</title>
    <link rel="stylesheet" href="style.css">
    <script src="cart.js"></script>
</head>

<body>
    <div id="cart-feedback">Added to cart!</div>

    <div class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="images/favicon (1) (1).png" alt="Logo" width="50px">
                <span>Arpith Binsa</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/services">Services</a></li>
                    <li><a href="/products">Products</a></li>
                    <li><a href="/contact">Contact</a></li>
                    <li><a href="/account" class="btn-nav">Account</a></li>
                    <li><a href="/cart" class="cart-icon-wrap">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count">0</span>
                    </a></li>
                </ul>
            </nav>
        </div>
    </div>

    <div id="app"></div>

    <div class="footer">
        <div class="container">
            <p>© 2026 Arpith Binsa. All rights reserved.</p>
        </div>
    </div>

    <script>
        const API = '/api';

        // ─── ROUTER ──────────────────────────────────────────────────────────────

        const routes = {
            '/': renderHome,
            '/services': renderNotFound,
            '/products': renderProducts,
            '/contact': renderNotFound,
            '/account': renderNotFound,
            '/cart': renderNotFound,
            '/add-product': renderNotFound
        };

        function navigate(path) {
            window.history.pushState({}, '', path);
            renderRoute(path);
        }

        function renderRoute(path) {
            const fn = routes[path] || renderNotFound;
            fn();
            updateActiveNav(path);
            window.scrollTo(0, 0);
        }

        function updateActiveNav(path) {
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) link.classList.add('active');
            });
        }

        function renderNotFound() {
            document.title = 'Arpith Binsa';
            document.getElementById('app').innerHTML =
                '<p style="padding:200px 0;text-align:center">Coming soon.</p>';
        }

        document.addEventListener('click', e => {
            const link = e.target.closest('a[href]');
            if (!link) return;
            const href = link.getAttribute('href');
            if (href && href.startsWith('/') && !href.startsWith('//')) {
                e.preventDefault();
                navigate(href);
            }
        });

        window.addEventListener('popstate', () => renderRoute(window.location.pathname));

        document.addEventListener('DOMContentLoaded', () => renderRoute(window.location.pathname));

        // ─── HOME ────────────────────────────────────────────────────────────────

        function renderHome() {
            document.title = 'Arpith Binsa';
            document.getElementById('app').innerHTML = `
                <div class="hero">
                    <div class="hero-overlay"></div>
                    <div class="container hero-content">
                        <p class="hero-sub">Photography &amp; Videography</p>
                        <h1>Turn Moments into<br>Masterpieces</h1>
                        <p class="hero-desc">Based in Berlin. Available worldwide.</p>
                        <a href="/services" class="btn-primary">View Services</a>
                    </div>
                </div>

                <div class="services" id="services">
                    <div class="container">
                        <p class="section-label">What I Offer</p>
                        <h2>Services</h2>
                        <div class="services-grid">

                            <a href="/services/football" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/services/football1.jpg" alt="Sports Photography">
                                </div>
                                <div class="service-info">
                                    <h3>Sports Photography</h3>
                                    <p>Football, athletics and action shots that capture the energy of the moment.</p>
                                    <span class="price">€200 – €500</span>
                                </div>
                            </a>

                            <a href="/services/wedding" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/wedding.jpg" alt="Wedding Photography">
                                </div>
                                <div class="service-info">
                                    <h3>Wedding Photography</h3>
                                    <p>Timeless wedding coverage from ceremony to reception.</p>
                                    <span class="price">€1000 – €2000</span>
                                </div>
                            </a>

                            <a href="/services/automotive" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/automotive.jpg" alt="Automotive Photography">
                                </div>
                                <div class="service-info">
                                    <h3>Automotive Photography</h3>
                                    <p>Stunning car shots for dealerships, marketing, and editorial use.</p>
                                    <span class="price">€800 – €1500</span>
                                </div>
                            </a>

                            <a href="/services/portrait" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/portrait.jpg" alt="Portrait Sessions">
                                </div>
                                <div class="service-info">
                                    <h3>Portrait Sessions</h3>
                                    <p>Professional headshots and personal portraits in studio or on location.</p>
                                    <span class="price">€150 – €300</span>
                                </div>
                            </a>

                            <a href="/services" class="service-card service-seemore">
                                <div class="seemore-content">
                                    <div class="seemore-arrow">→</div>
                                    <p>See All</p>
                                    <p>Services</p>
                                </div>
                            </a>

                        </div>
                    </div>
                </div>

                <div class="products" id="products">
                    <div class="container">
                        <p class="section-label">Gears That I Use Everyday</p>
                        <h2>Products</h2>
                        <div class="products-grid">

                            <a href="/products/a7m3" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/a7m3.jpg" alt="Sony A7 III">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Camera Body</span>
                                    <h3>Sony A7 III</h3>
                                    <p>Full-frame mirrorless. My primary shooting body for everything.</p>
                                    <span class="price">€1,299</span>
                                </div>
                            </a>

                            <a href="/products/200600" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/200600.jpg" alt="Sony 200-600mm G">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Lens</span>
                                    <h3>Sony 200-600mm G</h3>
                                    <p>My go-to for sports and action. Reaches far without losing sharpness.</p>
                                    <span class="price">€1,548</span>
                                </div>
                            </a>

                            <a href="/products/50mm" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/50mm.jpg" alt="Sony 50mm f1.8">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Lens</span>
                                    <h3>Sony 50mm f1.8</h3>
                                    <p>Lightweight and sharp. Perfect for portraits and everyday shooting.</p>
                                    <span class="price">€179</span>
                                </div>
                            </a>

                            <a href="/products/dji" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/rs3mini.jpg" alt="DJI RS3 Mini">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Stabiliser</span>
                                    <h3>DJI RS3 Mini</h3>
                                    <p>Compact gimbal that keeps footage smooth without the bulk.</p>
                                    <span class="price">€209</span>
                                </div>
                            </a>

                            <a href="/products" class="product-card product-seemore">
                                <div class="seemore-content">
                                    <div class="seemore-arrow">→</div>
                                    <p>See All</p>
                                    <p>Products</p>
                                </div>
                            </a>

                        </div>
                    </div>
                </div>
            `;
        }

        // ─── PRODUCTS ────────────────────────────────────────────────────────────

        let allProducts = [];
        let currentCategory = 'all';
        let searchTimeout;

        function renderProducts() {
            document.title = 'Products – Arpith Binsa';
            document.getElementById('app').innerHTML = `
                <div class="page-hero">
                    <div class="container">
                        <p class="section-label">Gear I Personally Use</p>
                        <h1>Products</h1>
                    </div>
                </div>

                <div class="products-page">
                    <div class="container">

                        <div class="products-controls">
                            <div class="search-wrap">
                                <input type="text" id="search-input" class="text-input search-input"
                                    placeholder="Search products..." oninput="handleSearch()">
                            </div>
                            <div class="filter-tabs">
                                <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                                <button class="filter-btn" onclick="filterProducts('camera', this)">Cameras</button>
                                <button class="filter-btn" onclick="filterProducts('lens', this)">Lenses</button>
                                <button class="filter-btn" onclick="filterProducts('stabiliser', this)">Stabilisers</button>
                                <button class="filter-btn" onclick="filterProducts('bag', this)">Bags</button>
                                <button class="filter-btn" onclick="filterProducts('accessory', this)">Accessories</button>
                            </div>
                        </div>

                        <div id="loading" class="loading-state">Loading products...</div>
                        <div class="products-listing" id="products-listing" style="display:none"></div>
                        <div id="products-empty" class="cart-empty-box" style="display:none">
                            <p>No products found.</p>
                        </div>

                    </div>
                </div>
            `;

            currentCategory = 'all';
            loadProducts();
        }

        async function loadProducts(search = '') {
            const loading = document.getElementById('loading');
            const listing = document.getElementById('products-listing');
            const empty = document.getElementById('products-empty');
            if (!loading) return;

            loading.style.display = 'block';
            listing.style.display = 'none';
            empty.style.display = 'none';

            try {
                let url = `${API}/products`;
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (currentCategory !== 'all') params.push(`category=${currentCategory}`);
                if (params.length) url += '?' + params.join('&');

                const res = await fetch(url);
                const products = await res.json();
                allProducts = products;

                loading.style.display = 'none';

                if (products.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                listing.style.display = 'flex';
                listing.innerHTML = products.map(product => `
                    <div class="product-listing-card">
                        <div class="product-listing-img-wrap" onclick="goToProduct('${product._id}')" style="cursor:pointer">
                            <img src="${product.image}" alt="${product.name}"
                                onerror="this.src='images/favicon (1) (1).png'">
                        </div>
                        <div class="product-listing-info">
                            <span class="product-tag">${product.category}</span>
                            <h3 onclick="goToProduct('${product._id}')" style="cursor:pointer">${product.name}</h3>
                            <p>${product.description}</p>
                            <div class="product-listing-bottom">
                                <span class="product-listing-price">€${product.price.toLocaleString()}</span>
                                <div class="qty-add">
                                    <div class="quantity-control">
                                        <button onclick="changeQty('${product._id}', -1)">−</button>
                                        <span id="qty-${product._id}">1</span>
                                        <button onclick="changeQty('${product._id}', 1)">+</button>
                                    </div>
                                    <button class="btn-add-cart"
                                        onclick="addToCart('${product._id}', '${product.name}', ${product.price}, '${product.image}', parseInt(document.getElementById('qty-${product._id}').textContent))">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                document.querySelector('#products-empty p').textContent =
                    'Failed to load products. Is the server running?';
            }
        }

        function changeQty(id, direction) {
            const el = document.getElementById('qty-' + id);
            let val = parseInt(el.textContent);
            el.textContent = Math.max(1, val + direction);
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const search = document.getElementById('search-input').value;
                loadProducts(search);
            }, 400);
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = category;
            const search = document.getElementById('search-input').value;
            loadProducts(search);
        }

        function goToProduct(id) {
            navigate('/products/' + id);
        }
    </script>

</body>

</html>
