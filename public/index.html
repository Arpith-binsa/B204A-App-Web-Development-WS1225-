        const API = '/api';

        // ─── ROUTER ──────────────────────────────────────────────────────────────

        const routes = {
            '/': renderHome,
            '/services': renderServices,
            '/products': renderProducts,
            '/contact': renderContact,
            '/account': renderAccount,
            '/cart': renderCart,
            '/add-product': renderAddProduct
        };

        function navigate(path) {
            window.history.pushState({}, '', path);
            renderRoute(path);
        }

        function renderRoute(path) {
            const productMatch = path.match(/^\/products\/(.+)$/);
            if (productMatch) {
                renderProductDetail(productMatch[1]);
                updateActiveNav('/products');
                window.scrollTo(0, 0);
                return;
            }
            const fn = routes[path] || renderNotFound;
            fn();
            updateActiveNav(path);
            window.scrollTo(0, 0);
        }

        function updateActiveNav(path) {
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) link.classList.add('active');
            });
        }

        function renderNotFound() {
            document.title = 'Arpith Binsa';
            document.getElementById('app').innerHTML =
                '<p style="padding:200px 0;text-align:center">Coming soon.</p>';
        }

        document.addEventListener('click', e => {
            const link = e.target.closest('a[href]');
            if (!link) return;
            const href = link.getAttribute('href');
            if (href && href.startsWith('/') && !href.startsWith('//')) {
                e.preventDefault();
                navigate(href);
            }
        });

        window.addEventListener('popstate', () => renderRoute(window.location.pathname));

        document.addEventListener('DOMContentLoaded', () => renderRoute(window.location.pathname));

        // ─── PRODUCTS ────────────────────────────────────────────────────────────

        let allProducts = [];
        let currentCategory = 'all';
        let searchTimeout;

        function renderProducts() {
            document.title = 'Products – Arpith Binsa';
            document.getElementById('app').innerHTML = `

                    <div class="container">
                        <p class="section-label">Gear I Personally Use</p>
                        <h1>Products</h1>
                    </div>
                </div>

                <div class="products-page">

                            <div class="search-wrap">
                                <input type="text" id="search-input" class="text-input search-input"
                                    placeholder="Search products..." oninput="handleSearch()">
                            </div>
                            <div class="filter-tabs">
                                <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                                <button class="filter-btn" onclick="filterProducts('camera', this)">Cameras</button>
                                <button class="filter-btn" onclick="filterProducts('lens', this)">Lenses</button>
                                <button class="filter-btn" onclick="filterProducts('stabiliser', this)">Stabilisers</button>
                                <button class="filter-btn" onclick="filterProducts('bag', this)">Bags</button>
                                <button class="filter-btn" onclick="filterProducts('accessory', this)">Accessories</button>
                            </div>
                        </div>

                        <div id="loading" class="loading-state">Loading products...</div>
                        <div class="products-listing" id="products-listing" style="display:none"></div>
                        <div id="products-empty" class="cart-empty-box" style="display:none">
                            <p>No products found.</p>
                        </div>

                    </div>
                </div>
            `;

            currentCategory = 'all';
            loadProducts();
        }

        async function loadProducts(search = '') {
            const loading = document.getElementById('loading');
            const listing = document.getElementById('products-listing');
            const empty = document.getElementById('products-empty');
            if (!loading) return;

            loading.style.display = 'block';
            listing.style.display = 'none';
            empty.style.display = 'none';

            try {
                let url = `${API}/products`;
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (currentCategory !== 'all') params.push(`category=${currentCategory}`);
                if (params.length) url += '?' + params.join('&');

                const res = await fetch(url);
                const products = await res.json();
                allProducts = products;

                loading.style.display = 'none';

                if (products.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                listing.style.display = 'flex';
                listing.innerHTML = products.map(product => `
                    <div class="product-listing-card">
                        <div class="product-listing-img-wrap" onclick="goToProduct('${product._id}')" style="cursor:pointer">
                            <img src="${product.image}" alt="${product.name}"
                                onerror="this.src='images/favicon (1) (1).png'">
                        </div>
                        <div class="product-listing-info">
                            <span class="product-tag">${product.category}</span>
                            <h3 onclick="goToProduct('${product._id}')" style="cursor:pointer">${product.name}</h3>
                            <p>${product.description}</p>
                            <div class="product-listing-bottom">
                                <span class="product-listing-price">€${product.price.toLocaleString()}</span>
                                <div class="qty-add">
                                    <div class="quantity-control">
                                        <button onclick="changeQty('${product._id}', -1)">−</button>
                                        <span id="qty-${product._id}">1</span>
                                        <button onclick="changeQty('${product._id}', 1)">+</button>
                                    </div>
                                    <button class="btn-add-cart"
                                        onclick="addToCart('${product._id}', '${product.name}', ${product.price}, '${product.image}', parseInt(document.getElementById('qty-${product._id}').textContent))">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                document.querySelector('#products-empty p').textContent =
                    'Failed to load products. Is the server running?';
            }
        }

        function changeQty(id, direction) {
            const el = document.getElementById('qty-' + id);
            let val = parseInt(el.textContent);
            el.textContent = Math.max(1, val + direction);
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const search = document.getElementById('search-input').value;
                loadProducts(search);
            }, 400);
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = category;
            const search = document.getElementById('search-input').value;
            loadProducts(search);
        }

        function goToProduct(id) {
            navigate('/products/' + id);
        }

        // ─── PRODUCT DETAIL ──────────────────────────────────────────────────────

            document.getElementById('app').innerHTML = `
                <div class="product-detail-page">
                    <div class="container">
                        <a href="/products" class="back-link">← Back to Products</a>
                        <div id="product-loading" class="loading-state">Loading...</div>

                                    <div class="slider-main">
                                        <div class="slider-img-wrap">
                                            <img id="detail-img" src="" alt="">
                                        </div>
                                    </div>
                                </div>
                                <div class="product-detail-right">
                                    <span class="product-tag" id="detail-category"></span>
                                    <h1 class="product-detail-title" id="detail-name"></h1>
                                    <p class="product-detail-sub" id="detail-desc"></p>
                                    <div class="product-detail-price" id="detail-price"></div>
                                    <div class="product-specs" id="detail-specs"></div>
                                    <div class="product-actions">
                                        <div class="quantity-wrap">
                                            <label>Quantity</label>
                                            <div class="quantity-control">
                                                <button onclick="changeDetailQty(-1)">−</button>
                                                <span id="detail-qty">1</span>
                                                <button onclick="changeDetailQty(1)">+</button>
                                            </div>
                                        </div>
                                        <button class="btn-add-cart" id="detail-add-cart-btn">Add to Cart</button>
                                        <div id="paypal-button-container"></div>
                                        <div id="order-success" class="booking-success" style="display:none">
                                            Order confirmed! You will receive an email shortly.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="product-error" style="display:none">
                            <div class="cart-empty-box"><p>Product not found.</p></div>
                        </div>
                    </div>
                </div>
            `;

            try {
                const res = await fetch(`${API}/products/${id}`);
                if (!res.ok) throw new Error();
                productDetailData = await res.json();

                document.title = `${productDetailData.name} – Arpith Binsa`;
                document.getElementById('detail-category').textContent = productDetailData.category;
                document.getElementById('detail-name').textContent = productDetailData.name;
                document.getElementById('detail-desc').textContent = productDetailData.description;
                document.getElementById('detail-price').textContent = '€' + productDetailData.price.toLocaleString();
                document.getElementById('detail-img').src = productDetailData.image;
                document.getElementById('detail-img').alt = productDetailData.name;

                if (productDetailData.specs && Object.keys(productDetailData.specs).length > 0) {
                    document.getElementById('detail-specs').innerHTML = `
                        <h3>Technical Details</h3>
                        <table class="specs-table">
                            ${Object.entries(productDetailData.specs).map(([k, v]) => `
                                <tr><td>${k}</td><td>${v}</td></tr>
                            `).join('')}
                        </table>
                    `;
                }

                document.getElementById('detail-add-cart-btn').onclick = () => {
                    addToCart(productDetailData._id, productDetailData.name, productDetailData.price, productDetailData.image, productDetailQty);
                };

                document.getElementById('product-loading').style.display = 'none';
                document.getElementById('product-content').style.display = 'block';

                loadPayPalSDK(renderDetailPayPal);

            } catch (err) {
                document.getElementById('product-loading').style.display = 'none';
                document.getElementById('product-error').style.display = 'block';
            }
        }

        function changeDetailQty(direction) {
            productDetailQty = Math.max(1, productDetailQty + direction);
            document.getElementById('detail-qty').textContent = productDetailQty;
        }

        function renderDetailPayPal() {
            if (productDetailPaypalRendered) return;
            productDetailPaypalRendered = true;

            paypal.Buttons({
                createOrder: function (data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: (productDetailData.price * productDetailQty).toString(), currency_code: 'EUR' },
                            description: `${productDetailData.name} x${productDetailQty}`
                        }]
                    });
                },
                onApprove: function (data, actions) {
                    return actions.order.capture().then(function (details) {
                        const token = localStorage.getItem('token');
                        if (token) {
                            fetch(`${API}/orders`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({
                                    items: [{ name: productDetailData.name, price: productDetailData.price, qty: productDetailQty, image: productDetailData.image }],
                                    total: productDetailData.price * productDetailQty,
                                    paypalOrderId: details.id
                                })
                            });
                        }
                        document.getElementById('paypal-button-container').style.display = 'none';
                        document.getElementById('order-success').style.display = 'block';
                    });
                },
                onError: function () { alert('Payment failed. Please try again.'); },
                style: { color: 'gold', shape: 'pill', label: 'buynow', height: 50 }
            }).render('#paypal-button-container');
        }

        async function submitProduct() {
            const token = localStorage.getItem('token');
            const errorEl = document.getElementById('form-error');
            const successEl = document.getElementById('form-success');

            const name = document.getElementById('prod-name').value.trim();
            const description = document.getElementById('prod-desc').value.trim();
            const price = document.getElementById('prod-price').value;
            const category = document.getElementById('prod-category').value;
            const image = document.getElementById('prod-image').value.trim();

            if (!name || !description || !price || !category) {
                errorEl.textContent = 'Please fill in all required fields.';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            const specs = {};
            document.querySelectorAll('.spec-row').forEach(row => {
                const key = row.querySelector('.spec-key').value.trim();
                const value = row.querySelector('.spec-value').value.trim();
                if (key && value) specs[key] = value;
            });

            try {
                const res = await fetch(`${API}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, description, price: Number(price), category, image, specs })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.message || 'Failed to add product.';
                    errorEl.style.display = 'block';
                    successEl.style.display = 'none';
                    return;
                }

                errorEl.style.display = 'none';
                successEl.style.display = 'block';

                document.getElementById('prod-name').value = '';
                document.getElementById('prod-desc').value = '';
                document.getElementById('prod-price').value = '';
                document.getElementById('prod-category').value = '';
                document.getElementById('prod-image').value = '';
                document.getElementById('specs-list').innerHTML = `
                    <div class="spec-row">
                        <input type="text" class="text-input spec-key" placeholder="eg: Brand">
                        <input type="text" class="text-input spec-value" placeholder="eg: Sony">
                        <button class="remove-spec" onclick="removeSpec(this)">×</button>
                    </div>
                `;

            } catch (err) {
                errorEl.textContent = 'Something went wrong. Is the server running?';
                errorEl.style.display = 'block';
            }
        }

        function refreshCartItems() {
            const cart = getCart();
            const items = Object.values(cart);
            const container = document.getElementById('cart-items');
            const emptyState = document.getElementById('cart-empty');
            const cartLayout = document.getElementById('cart-layout');

            if (items.length === 0) {
                cartLayout.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            cartLayout.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = items.map(item => `
                <div class="cart-item" id="item-${item.id}">
                    <div class="cart-item-img">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p class="cart-item-price">€${item.price.toLocaleString()}</p>
                        <div class="quantity-control" style="margin-top: 12px">
                            <button onclick="changeCartItemQty('${item.id}', ${item.qty - 1})">−</button>
                            <span>${item.qty}</span>
                            <button onclick="changeCartItemQty('${item.id}', ${item.qty + 1})">+</button>
                        </div>
                    </div>
                    <div class="cart-item-right">
                        <p class="cart-item-total">€${(item.price * item.qty).toLocaleString()}</p>
                        <button class="cart-remove" onclick="removeCartItem('${item.id}')">Remove</button>
                    </div>
                </div>
            `).join('');

            updateCartSummary();
            loadPayPalSDK(renderPayPalButtons);
        }

        function changeCartItemQty(id, newQty) {
            updateQty(id, newQty);
            refreshCartItems();
        }

        function removeCartItem(id) {

        function updateCartSummary() {
            const count = getCartCount();
            const total = getCartTotal();
            document.getElementById('summary-count').textContent = count;
            document.getElementById('summary-subtotal').textContent = '€' + total.toLocaleString();
            document.getElementById('summary-total').textContent = '€' + total.toLocaleString();
        }

        function loadPayPalSDK(callback) {
            if (window.paypal) {
                callback();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://www.paypal.com/sdk/js?client-id=ATLGa7p3a7o8yrpzlIlDmOSI8cPnZT_QyID5ajjYTfxYumjay_QUZwrlmmWBUJ6XWutoZUwi2VUcJswe&currency=EUR';
            script.onload = callback;
            document.head.appendChild(script);
        }

        function renderPayPalButtons() {
            if (paypalRendered) return;
            paypalRendered = true;

            paypal.Buttons({
                createOrder: function (data, actions) {
                    const total = getCartTotal();
                    const itemList = Object.values(getCart()).map(i => `${i.name} x${i.qty}`).join(', ');
                    return actions.order.create({
                        purchase_units: [{ amount: { value: total.toString(), currency_code: 'EUR' }, description: itemList }]
                    });
                },
                onApprove: function (data, actions) {
                    return actions.order.capture().then(function (details) {
                        const token = localStorage.getItem('token');
                        const cart = getCart();
                        const total = getCartTotal();
                        if (token) {
                            fetch(`${API}/orders`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ items: Object.values(cart), total, paypalOrderId: details.id })
                            });
                        }
                        clearCart();
                        document.getElementById('paypal-button-container').style.display = 'none';
                        document.getElementById('order-success').style.display = 'block';
                        document.getElementById('cart-items').style.display = 'none';
                    });
                },
                onError: function () {
                    alert('Payment failed. Please try again.');
                },
                style: { color: 'gold', shape: 'pill', label: 'buynow', height: 50 }
            }).render('#paypal-button-container');
        }

        function showAuthSection() {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('account-section').style.display = 'none';
        }

        function showAccountSection() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('account-section').style.display = 'block';
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('account-name').textContent = `Hello, ${user.name}`;
                document.getElementById('account-email').textContent = user.email;
            }
            loadOrders();
        }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.message || 'Login failed.';
                    errorEl.style.display = 'block';
                    return;
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAccountSection();
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Try again.';
                errorEl.style.display = 'block';
            }
        }

                    errorEl.style.display = 'block';
                    return;

            } catch (err) {

                errorEl.style.display = 'block';
            }
        }

            localStorage.removeItem('token');

        async function loadOrders() {

            const email = document.getElementById('contact-email').value.trim();

            const message = document.getElementById('contact-message').value.trim();

                successEl.style.display = 'none';

                const data = await res.json();

                errorEl.textContent = 'Something went wrong. Is the server running?';
                errorEl.style.display = 'block';
