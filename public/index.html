<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Arpith Binsa</title>
    <link rel="stylesheet" href="style.css">
    <script src="cart.js"></script>
</head>

<body>
    <div id="cart-feedback">Added to cart!</div>

    <div class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="images/favicon (1) (1).png" alt="Logo" width="50px">
                <span>Arpith Binsa</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/services">Services</a></li>
                    <li><a href="/products">Products</a></li>
                    <li><a href="/contact">Contact</a></li>
                    <li><a href="/account" class="btn-nav">Account</a></li>
                    <li><a href="/cart" class="cart-icon-wrap">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count">0</span>
                    </a></li>
                </ul>
            </nav>
        </div>
    </div>

    <div id="app"></div>

    <div class="footer">
        <div class="container">
            <p>© 2026 Arpith Binsa. All rights reserved.</p>
        </div>
    </div>

    <script>
        const API = '/api';

        const routes = {
            '/': renderHome,
            '/services': () => `<p style="padding:200px 0;text-align:center">Services — coming soon</p>`,
            '/products': () => `<p style="padding:200px 0;text-align:center">Products — coming soon</p>`,
            '/contact': () => `<p style="padding:200px 0;text-align:center">Contact — coming soon</p>`,
            '/account': () => `<p style="padding:200px 0;text-align:center">Account — coming soon</p>`,
            '/cart': () => `<p style="padding:200px 0;text-align:center">Cart — coming soon</p>`,
            '/add-product': () => `<p style="padding:200px 0;text-align:center">Add Product — coming soon</p>`
        };

        function navigate(path) {
            window.history.pushState({}, '', path);
            renderRoute(path);
        }

        function renderRoute(path) {
            const fn = routes[path] || (() => `<p style="padding:200px 0;text-align:center">Page not found.</p>`);
            document.getElementById('app').innerHTML = fn();
            updateActiveNav(path);
            window.scrollTo(0, 0);
        }

        function updateActiveNav(path) {
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) {
                    link.classList.add('active');
                }
            });
        }

        // intercept all internal link clicks
        document.addEventListener('click', e => {
            const link = e.target.closest('a[href]');
            if (!link) return;
            const href = link.getAttribute('href');
            if (href && href.startsWith('/') && !href.startsWith('//')) {
                e.preventDefault();
                navigate(href);
            }
        });

        window.addEventListener('popstate', () => renderRoute(window.location.pathname));

        document.addEventListener('DOMContentLoaded', () => renderRoute(window.location.pathname));

        // ─── HOME ────────────────────────────────────────────────────────────────

        function renderHome() {
            document.title = 'Arpith Binsa';
            return `
                <div class="hero">
                    <div class="hero-overlay"></div>
                    <div class="container hero-content">
                        <p class="hero-sub">Photography &amp; Videography</p>
                        <h1>Turn Moments into<br>Masterpieces</h1>
                        <p class="hero-desc">Based in Berlin. Available worldwide.</p>
                        <a href="/services" class="btn-primary">View Services</a>
                    </div>
                </div>

                <div class="services" id="services">
                    <div class="container">
                        <p class="section-label">What I Offer</p>
                        <h2>Services</h2>
                        <div class="services-grid">

                            <a href="/services/football" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/services/football1.jpg" alt="Sports Photography">
                                </div>
                                <div class="service-info">
                                    <h3>Sports Photography</h3>
                                    <p>Football, athletics and action shots that capture the energy of the moment.</p>
                                    <span class="price">€200 – €500</span>
                                </div>
                            </a>

                            <a href="/services/wedding" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/wedding.jpg" alt="Wedding Photography">
                                </div>
                                <div class="service-info">
                                    <h3>Wedding Photography</h3>
                                    <p>Timeless wedding coverage from ceremony to reception.</p>
                                    <span class="price">€1000 – €2000</span>
                                </div>
                            </a>

                            <a href="/services/automotive" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/automotive.jpg" alt="Automotive Photography">
                                </div>
                                <div class="service-info">
                                    <h3>Automotive Photography</h3>
                                    <p>Stunning car shots for dealerships, marketing, and editorial use.</p>
                                    <span class="price">€800 – €1500</span>
                                </div>
                            </a>

                            <a href="/services/portrait" class="service-card">
                                <div class="service-img-wrap">
                                    <img src="images/portrait.jpg" alt="Portrait Sessions">
                                </div>
                                <div class="service-info">
                                    <h3>Portrait Sessions</h3>
                                    <p>Professional headshots and personal portraits in studio or on location.</p>
                                    <span class="price">€150 – €300</span>
                                </div>
                            </a>

                            <a href="/services" class="service-card service-seemore">
                                <div class="seemore-content">
                                    <div class="seemore-arrow">→</div>
                                    <p>See All</p>
                                    <p>Services</p>
                                </div>
                            </a>

                        </div>
                    </div>
                </div>

                <div class="products" id="products">
                    <div class="container">
                        <p class="section-label">Gears That I Use Everyday</p>
                        <h2>Products</h2>
                        <div class="products-grid">

                            <a href="/products/a7m3" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/a7m3.jpg" alt="Sony A7 III">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Camera Body</span>
                                    <h3>Sony A7 III</h3>
                                    <p>Full-frame mirrorless. My primary shooting body for everything.</p>
                                    <span class="price">€1,299</span>
                                </div>
                            </a>

                            <a href="/products/200600" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/200600.jpg" alt="Sony 200-600mm G">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Lens</span>
                                    <h3>Sony 200-600mm G</h3>
                                    <p>My go-to for sports and action. Reaches far without losing sharpness.</p>
                                    <span class="price">€1,548</span>
                                </div>
                            </a>

                            <a href="/products/50mm" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/50mm.jpg" alt="Sony 50mm f1.8">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Lens</span>
                                    <h3>Sony 50mm f1.8</h3>
                                    <p>Lightweight and sharp. Perfect for portraits and everyday shooting.</p>
                                    <span class="price">€179</span>
                                </div>
                            </a>

                            <a href="/products/dji" class="product-card">
                                <div class="product-img-wrap">
                                    <img src="images/rs3mini.jpg" alt="DJI RS3 Mini">
                                </div>
                                <div class="product-info">
                                    <span class="product-tag">Stabiliser</span>
                                    <h3>DJI RS3 Mini</h3>
                                    <p>Compact gimbal that keeps footage smooth without the bulk.</p>
                                    <span class="price">€209</span>
                                </div>
                            </a>

                            <a href="/products" class="product-card product-seemore">
                                <div class="seemore-content">
                                    <div class="seemore-arrow">→</div>
                                    <p>See All</p>
                                    <p>Products</p>
                                </div>
                            </a>

                        </div>
                    </div>
                </div>
            `;
        }
    </script>

</body>

</html>
