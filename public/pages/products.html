<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Products – Arpith Binsa</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../cart.js"></script>
</head>

<body>
    <div id="cart-feedback">Added to cart!</div>

    <div class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="../images/favicon (1) (1).png" alt="Logo" width="50px">
                <span>Arpith Binsa</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="products.html" class="active">Products</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="account.html" class="btn-nav">Account</a></li>
                    <li><a href="cart.html" class="cart-icon-wrap">
                            <span class="cart-icon">🛒</span>
                            <span class="cart-count">0</span>
                        </a></li>
                </ul>
            </nav>
        </div>
    </div>

    <div class="page-hero">
        <div class="container">
            <p class="section-label">Gear I Personally Use</p>
            <h1>Products</h1>
        </div>
    </div>

    <div class="products-page">
        <div class="container">

            <div class="products-controls">
                <div class="search-wrap">
                    <input type="text" id="search-input" class="text-input search-input"
                        placeholder="Search products..." oninput="handleSearch()">
                </div>
                <div class="filter-tabs">
                    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                    <button class="filter-btn" onclick="filterProducts('camera', this)">Cameras</button>
                    <button class="filter-btn" onclick="filterProducts('lens', this)">Lenses</button>
                    <button class="filter-btn" onclick="filterProducts('stabiliser', this)">Stabilisers</button>
                    <button class="filter-btn" onclick="filterProducts('bag', this)">Bags</button>
                    <button class="filter-btn" onclick="filterProducts('accessory', this)">Accessories</button>
                </div>
            </div>

            <div id="loading" class="loading-state">Loading products...</div>
            <div class="products-listing" id="products-listing" style="display:none"></div>
            <div id="products-empty" class="cart-empty-box" style="display:none">
                <p>No products found.</p>
            </div>

        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 Arpith Binsa. All rights reserved.</p>
        </div>
    </div>

    <script>
        const API = 'http://arpith-binsa.onrender.com/api';
        let allProducts = [];
        let currentCategory = 'all';

        // MAP PRODUCT NAME TO SPECIFIC HTML PAGE
        const pageMap = {
            'Sony A7 III': 'products/a7m3.html',
            'Sony 200-600mm G': 'products/200600.html',
            'Sony 50mm f1.8': 'products/50mm.html',
            'DJI RS3 Mini': 'products/dji.html',
            'Kentfaith Backpack': 'products/kentfaith.html',
            'Sony SF-G 128GB SD Card': 'products/sdcard.html',
            'Sony NP-FZ100 Battery': 'products/battery.html'
        };

        function goToProduct(id) {
                const product = allProducts.find(p => p._id === id);
                if (!product) return;

                const page = pageMap[product.name];
                if (page) {
                    // existing products with their own HTML page
                    window.location.href = page;
                } else {
                    // new products added via form use dynamic page
                    localStorage.setItem('currentProduct', id);
                    window.location.href = 'product-detail.html';
                }
            }

        // LOAD PRODUCTS FROM API
        async function loadProducts(search = '') {
            const loading = document.getElementById('loading');
            const listing = document.getElementById('products-listing');
            const empty = document.getElementById('products-empty');

            loading.style.display = 'block';
            listing.style.display = 'none';
            empty.style.display = 'none';

            try {
                let url = `${API}/products`;
                const params = [];
                if (search) params.push(`search=${encodeURIComponent(search)}`);
                if (currentCategory !== 'all') params.push(`category=${currentCategory}`);
                if (params.length) url += '?' + params.join('&');

                const res = await fetch(url);
                const products = await res.json();
                allProducts = products;

                loading.style.display = 'none';

                if (products.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                listing.style.display = 'flex';
                listing.innerHTML = products.map(product => `
                    <div class="product-listing-card">
                        <div class="product-listing-img-wrap"
                            onclick="goToProduct('${product._id}')"
                            style="cursor:pointer">
                            <img src="../${product.image}" alt="${product.name}"
                                onerror="this.src='../images/favicon (1) (1).png'">
                        </div>
                        <div class="product-listing-info">
                            <span class="product-tag">${product.category}</span>
                            <h3 onclick="goToProduct('${product._id}')"
                                style="cursor:pointer">${product.name}</h3>
                            <p>${product.description}</p>
                            <div class="product-listing-bottom">
                                <span class="product-listing-price">€${product.price.toLocaleString()}</span>
                                <div class="qty-add">
                                    <div class="quantity-control">
                                        <button onclick="changeQty('${product._id}', -1)">−</button>
                                        <span id="qty-${product._id}">1</span>
                                        <button onclick="changeQty('${product._id}', 1)">+</button>
                                    </div>
                                    <button class="btn-add-cart"
                                        onclick="addToCart('${product._id}', '${product.name}', ${product.price}, '${product.image}', parseInt(document.getElementById('qty-${product._id}').textContent))">
                                        Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                loading.style.display = 'none';
                empty.style.display = 'block';
                document.querySelector('#products-empty p').textContent =
                    'Failed to load products. Is the server running?';
                console.error(err);
            }
        }

        // QUANTITY
        function changeQty(id, direction) {
            const el = document.getElementById('qty-' + id);
            let val = parseInt(el.textContent);
            val = Math.max(1, val + direction);
            el.textContent = val;
        }

        // SEARCH with debounce
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const search = document.getElementById('search-input').value;
                loadProducts(search);
            }, 400);
        }

        // FILTER
        function filterProducts(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = category;
            const search = document.getElementById('search-input').value;
            loadProducts(search);
        }

        document.addEventListener('DOMContentLoaded', () => loadProducts());
    </script>

</body>

</html>
