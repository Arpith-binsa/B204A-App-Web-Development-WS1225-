<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Account – Arpith Binsa</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../cart.js"></script>
</head>

<body>

    <div id="cart-feedback">Added to cart!</div>

    <div class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="../images/favicon (1) (1).png" alt="Logo" width="50px">
                <span>Arpith Binsa</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="account.html" class="btn-nav active-account">Account</a></li>
                    <li><a href="cart.html" class="cart-icon-wrap">
                            <span class="cart-icon">🛒</span>
                            <span class="cart-count">0</span>
                        </a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- AUTH SECTION — shown when logged out -->
    <div id="auth-section" class="auth-page" style="display:none">
        <div class="container">
            <div class="auth-box">

                <!-- TABS -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchTab('register')">Register</button>
                </div>

                <!-- LOGIN FORM -->
                <div id="login-form">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" class="text-input" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" class="text-input" placeholder="Enter your password">
                    </div>

                    <div id="login-error" class="auth-error" style="display:none"></div>

                    <button class="auth-submit-btn" onclick="login()">Login</button>
                </div>

                <!-- REGISTER FORM -->
                <div id="register-form" style="display:none">
                    <h2>Create Account</h2>
                    <p>Join to track your orders</p>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="register-name" class="text-input" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" class="text-input" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="register-password" class="text-input"
                            placeholder="Create a password">
                    </div>

                    <div id="register-error" class="auth-error" style="display:none"></div>

                    <button class="auth-submit-btn" onclick="register()">Create Account</button>
                </div>

            </div>
        </div>
    </div>

    <!-- ACCOUNT SECTION — shown when logged in -->
    <div id="account-section" style="display:none">
        <div class="page-hero">
            <div class="container">
                <p class="section-label">Your Account</p>
                <h1 id="account-name">Welcome</h1>
                <p id="account-email" style="color:#999; margin-top:8px; font-size:14px"></p>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </div>

        <!-- ORDER HISTORY -->
        <div class="orders-section">
            <div class="container">
                <h2>Order History</h2>
                <div id="orders-list">
                    <!-- filled by JS -->
                </div>
                <div id="orders-empty" style="display:none">
                    <div class="cart-empty-box">
                        <p>No orders yet.</p>
                        <a href="products.html" class="btn-primary"
                            style="background:#111; color:#fff; margin-top:16px; display:inline-block">
                            Shop Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 Arpith Binsa. All rights reserved.</p>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        // CHECK IF LOGGED IN ON PAGE LOAD
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                showAccountSection();
            } else {
                showAuthSection();
            }
        });

        function showAuthSection() {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('account-section').style.display = 'none';
        }

        function showAccountSection() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('account-section').style.display = 'block';

            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('account-name').textContent = `Hello, ${user.name}`;
                document.getElementById('account-email').textContent = user.email;
            }

            loadOrders();
        }

        // SWITCH TABS
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
            }
        }

        // LOGIN
        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.message || 'Login failed.';
                    errorEl.style.display = 'block';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAccountSection();

            } catch (err) {
                errorEl.textContent = 'Something went wrong. Try again.';
                errorEl.style.display = 'block';
            }
        }

        // REGISTER
        async function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const errorEl = document.getElementById('register-error');

            if (!name || !email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.message || 'Registration failed.';
                    errorEl.style.display = 'block';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAccountSection();

            } catch (err) {
                errorEl.textContent = 'Something went wrong. Try again.';
                errorEl.style.display = 'block';
            }
        }

        // LOGOUT
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showAuthSection();
        }

        // LOAD ORDERS
        async function loadOrders() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API}/orders/my-orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const orders = await res.json();
                const list = document.getElementById('orders-list');
                const empty = document.getElementById('orders-empty');

                if (!orders.length) {
                    list.style.display = 'none';
                    empty.style.display = 'block';
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Order #${order._id.slice(-6).toUpperCase()}</span>
                                <span class="order-date">${new Date(order.createdAt).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'long', year: 'numeric'
                })}</span>
                            </div>
                            <div class="order-status">
                                <span class="status-badge">${order.status}</span>
                                <span class="order-total">€${order.total.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <div class="order-item-img">
                                        <img src="../${item.image}" alt="${item.name}">
                                    </div>
                                    <div class="order-item-info">
                                        <p class="order-item-name">${item.name}</p>
                                        <p class="order-item-meta">Qty: ${item.qty} · €${item.price.toLocaleString()}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error('Failed to load orders:', err);
            }
        }
    </script>

</body>

</html>
